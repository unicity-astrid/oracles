name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build capsules and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # Componentize with astrid-build (from the astrid release) rather than
      # raw cargo wasm. `astrid capsule install` expects a `.capsule`
      # archive (wasm component + manifest + WIT), not a bare module.
      - name: Fetch astrid-build from astrid release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download --repo unicity-astrid/astrid \
            --pattern 'astrid-*-x86_64-unknown-linux-gnu.tar.gz' --dir /tmp/astrid-cli
          tar xzf /tmp/astrid-cli/*.tar.gz -C /tmp/astrid-cli
          echo "$(dirname "$(find /tmp/astrid-cli -name astrid-build -type f | head -1)")" >> "$GITHUB_PATH"

      - name: Build .capsule archives (one per capsule crate)
        run: |
          set -euo pipefail
          mkdir -p dist
          for crate in \
            astrid-mcp \
            claude-runner claude-install claude-completion \
            codex-runner codex-install
          do
            astrid-build "crates/$crate" --output dist
          done
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.capsule
          generate_release_notes: true
