name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  B3SUM_VERSION: 1.8.5
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish signed oracle packs
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.94.0'
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: aos-oracles-release
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Validate immutable release inputs
        run: |
          set -euo pipefail
          test "$GITHUB_REF_TYPE" = tag || {
            echo "release workflow must be dispatched with a vX.Y.Z tag selected" >&2
            exit 1
          }
          printf '%s\n' "$GITHUB_REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'
          test "$(git rev-parse HEAD)" = "$(git rev-list -n1 "$GITHUB_REF_NAME")"
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "release tag is not contained in origin/main" >&2
            exit 1
          }
          git diff --exit-code
          python3 - <<'PY' >> "$GITHUB_ENV"
          import pathlib
          import tomllib

          version = "${{ github.ref_name }}".removeprefix("v")
          if pathlib.Path("release/oracle-version").read_text().strip() != version:
              raise SystemExit("release/oracle-version does not match tag")
          runtime = tomllib.loads(pathlib.Path("release/runtime-compatibility.toml").read_text())["runtime"]
          if runtime["release-ready"] is not True:
              raise SystemExit("runtime compatibility pin is not release-ready")
          for host in ("claude", "codex", "grok"):
              pack = tomllib.loads(pathlib.Path(f"packs/{host}.toml").read_text())["pack"]
              if pack["version"] != version:
                  raise SystemExit(f"packs/{host}.toml version does not match tag")
          print(f"RUNTIME_REPOSITORY={runtime['repository']}")
          print(f"RUNTIME_VERSION={runtime['version']}")
          print(f"RUNTIME_TAG={runtime['tag']}")
          print(f"RUNTIME_IDENTITY={runtime['release-workflow-identity']}")
          PY
          marker="<!-- aos-oracles-source:${GITHUB_SHA} -->"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true || {
              echo "published release already exists: $GITHUB_REF_NAME" >&2
              exit 1
            }
            test "$(gh release view "$GITHUB_REF_NAME" --json tagName --jq .tagName)" = "$GITHUB_REF_NAME" || {
              echo "existing draft is attached to another tag" >&2
              exit 1
            }
            first_line=$(gh release view "$GITHUB_REF_NAME" --json body --jq .body | sed -n '1p')
            test "$first_line" = "$marker" || {
              echo "existing draft was created from another source commit" >&2
              exit 1
            }
            echo "REUSE_RELEASE_DRAFT=true" >> "$GITHUB_ENV"
          else
            echo "REUSE_RELEASE_DRAFT=false" >> "$GITHUB_ENV"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate release source
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo test --workspace --locked --target x86_64-unknown-linux-gnu
          cargo clippy --workspace --all-targets --locked \
            --target x86_64-unknown-linux-gnu -- -D warnings
          scripts/sync-plugins.sh
          git diff --exit-code -- plugins/claude/bin plugins/grok/bin
          python3 scripts/test_pack_contract.py
          python3 scripts/test_brand_boundary.py
          python3 scripts/test_wit_contract.py
          python3 scripts/test_release_contract.py
          scripts/test-install.sh

      - name: Install pinned BLAKE3 tool
        run: cargo install b3sum --locked --version "$B3SUM_VERSION"

      - name: Build host adapter pack manifests
        run: |
          set -euo pipefail
          mkdir -p artifacts
          for host in claude codex grok; do
            install -m 0644 "packs/$host.toml" "artifacts/$host-pack.toml"
          done
          tar --sort=name --mtime='UTC 1970-01-01' \
            --owner=0 --group=0 --numeric-owner \
            -czf artifacts/aos-oracle-plugins.tar.gz \
            .agents .claude-plugin .grok-plugin \
            plugins/claude plugins/grok plugins/unicity-aos
          cp release/runtime-compatibility.toml artifacts/runtime-compatibility.toml
          cd artifacts
          b3sum ./*-pack.toml aos-oracle-plugins.tar.gz \
            runtime-compatibility.toml | sed 's#  \./#  #' > BLAKE3SUMS.txt

      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/*-pack.toml
            artifacts/aos-oracle-plugins.tar.gz
            artifacts/BLAKE3SUMS.txt
            artifacts/runtime-compatibility.toml

      - name: Sign and verify every release asset
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          cd artifacts
          identity="https://github.com/unicity-aos/oracles/.github/workflows/release.yml@refs/tags/${GITHUB_REF_NAME}"
          for asset in ./*-pack.toml aos-oracle-plugins.tar.gz \
            BLAKE3SUMS.txt runtime-compatibility.toml; do
            cosign sign-blob --yes --bundle "$asset.sigstore.json" "$asset"
            cosign verify-blob \
              --bundle "$asset.sigstore.json" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "$identity" \
              --use-signed-timestamps \
              "$asset"
          done

      - name: Verify exact release inventory
        run: |
          set -euo pipefail
          cd artifacts
          {
            printf '%s\n' \
              claude-pack.toml codex-pack.toml grok-pack.toml \
              aos-oracle-plugins.tar.gz BLAKE3SUMS.txt runtime-compatibility.toml
            for asset in \
              claude-pack.toml codex-pack.toml grok-pack.toml \
              aos-oracle-plugins.tar.gz BLAKE3SUMS.txt runtime-compatibility.toml
            do
              printf '%s.sigstore.json\n' "$asset"
            done
          } | sort > ../expected-assets.txt
          find . -maxdepth 1 -type f -exec basename {} \; | sort > ../actual-assets.txt
          diff -u ../expected-assets.txt ../actual-assets.txt

      - name: Stage, verify, and publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          marker="<!-- aos-oracles-source:${GITHUB_SHA} -->"
          if [ "$REUSE_RELEASE_DRAFT" != true ]; then
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --target "$GITHUB_SHA" \
              --draft \
              --title "Unicity AOS Oracles ${GITHUB_REF_NAME#v}" \
              --generate-notes \
              --notes "$marker"
          fi

          gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber

          test "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft)" = true
          test "$(gh release view "$GITHUB_REF_NAME" --json tagName --jq .tagName)" = "$GITHUB_REF_NAME"
          first_line=$(gh release view "$GITHUB_REF_NAME" --json body --jq .body | sed -n '1p')
          test "$first_line" = "$marker"
          gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name' \
            | sort > remote-assets.txt
          diff -u expected-assets.txt remote-assets.txt

          gh release edit "$GITHUB_REF_NAME" --draft=false
          test "$(gh release view "$GITHUB_REF_NAME" --json isImmutable --jq .isImmutable)" = true || {
            echo "published release is not immutable; enable repository release immutability before retrying with a new version" >&2
            exit 1
          }
