name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Matches rust-toolchain.toml / workspace.package.rust-version
# (edition 2024 requires this floor).
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy-shared:
    name: Clippy (shared, host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy shared libraries
        run: |
          cargo clippy -p oracle-core -p oracle-broker -p oracle-host \
            --all-targets --locked -- -D warnings

  test:
    name: Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      # Capsule crates pin wasm via crates/*/.cargo/config.toml. Shared
      # crates and unit tests run on the host target.
      - name: Unit tests
        run: |
          cargo test -p oracle-core -p oracle-broker -p oracle-host \
            -p claude-install -p claude-runner --lib --locked \
            --target x86_64-unknown-linux-gnu

  build-wasm:
    name: Build (wasm capsules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build all capsule crates
        run: |
          cargo build --locked --release \
            -p astrid-mcp \
            -p claude-runner -p claude-install -p claude-completion \
            -p codex-runner -p codex-install

  plugins:
    name: Plugin shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: sh -n wrappers and common scripts
        run: |
          set -euo pipefail
          for f in \
            plugins/common/bin/* \
            plugins/claude/bin/astrid-* \
            plugins/grok/bin/astrid-* \
            plugins/codex/bin/astrid-up \
            plugins/codex/bin/lib-astrid-resolve.sh
          do
            [ -e "$f" ] || continue
            [ -L "$f" ] && continue
            [ -f "$f" ] || continue
            case "$f" in *statusline*) continue ;; esac
            head -1 "$f" | grep -qE 'sh|bash' || continue
            sh -n "$f"
            echo "ok $f"
          done

      - name: Verify Codex plugin is self-contained
        run: |
          set -euo pipefail
          jq -e '.mcpServers.astrid.command == "./bin/astrid-up" and .mcpServers.astrid.cwd == "."' plugins/codex/.mcp.json
          test -f plugins/codex/bin/lib-astrid-resolve.sh
          test ! -L plugins/codex/bin/lib-astrid-resolve.sh
          test -f plugins/codex/bin/astrid-doctor
          test ! -L plugins/codex/bin/astrid-doctor

      - name: Verify Codex resolver environment overrides
        run: |
          set -euo pipefail
          bin_root="$(mktemp -d)"
          trap 'rm -rf "$bin_root"' EXIT
          touch "$bin_root/astrid" "$bin_root/astrid-daemon"
          chmod +x "$bin_root/astrid" "$bin_root/astrid-daemon"

          resolved="$(ASTRID_PLUGIN_ROOT="$PWD/plugins/codex" ASTRID_BIN_ROOT="$bin_root" sh -c '. "$ASTRID_PLUGIN_ROOT/bin/lib-astrid-resolve.sh"; astrid_resolve_pair')"
          test "$resolved" = "bin-root|$bin_root/astrid|$bin_root/astrid-daemon"

          resolved="$(ASTRID_PLUGIN_ROOT="$PWD/plugins/codex" ASTRID_BIN="$bin_root/astrid" ASTRID_DAEMON="$bin_root/astrid-daemon" sh -c '. "$ASTRID_PLUGIN_ROOT/bin/lib-astrid-resolve.sh"; astrid_resolve_pair')"
          test "$resolved" = "direct|$bin_root/astrid|$bin_root/astrid-daemon"
