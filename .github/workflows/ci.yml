name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Matches rust-toolchain.toml / workspace.package.rust-version
# (edition 2024 requires this floor).
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      # Capsule crates pin wasm for normal builds. Their pure unit tests are
      # deliberately compiled for the host so every workspace test runs.
      - name: Workspace tests
        run: cargo test --workspace --locked --target x86_64-unknown-linux-gnu

  build-wasm:
    name: Build (wasm capsules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build all capsule crates
        run: |
          cargo build --locked --release \
            -p aos-mcp \
            -p claude-runner -p claude-install -p claude-completion \
            -p codex-runner -p codex-install

  plugins:
    name: Plugin shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: sh -n wrappers and common scripts
        run: |
          set -euo pipefail
          for f in \
            plugins/common/bin/* \
            plugins/claude/bin/aos-* \
            plugins/grok/bin/aos-* \
            plugins/unicity-aos/bin/aos-* \
            plugins/unicity-aos/bin/lib-aos-resolve.sh \
            plugins/unicity-aos/install.sh
          do
            [ -e "$f" ] || continue
            [ -L "$f" ] && continue
            [ -f "$f" ] || continue
            head -1 "$f" | grep -qE 'sh|bash' || continue
            sh -n "$f"
            echo "ok $f"
          done

      - name: shellcheck plugin scripts
        run: |
          set -euo pipefail
          # --severity=warning is the tier that catches the unterminated-
          # ${...} expansion class (SC1078/SC2027 are warnings, not errors,
          # and `sh -n` accepts the damaged file outright).
          # SC1007: `CDPATH= cd --` is a deliberate idiom here.
          # SC2034: resolver vars are consumed by sourcing callers.
          shellcheck --severity=warning --exclude=SC1007,SC2034 \
            plugins/common/bin/aos-up plugins/common/bin/aos-doctor \
            plugins/common/bin/aos-install plugins/common/bin/lib-aos-resolve.sh \
            plugins/claude/bin/aos-up plugins/claude/bin/aos-doctor \
            plugins/claude/bin/aos-install plugins/claude/bin/lib-aos-resolve.sh \
            plugins/claude/bin/aos-statusline plugins/claude/bin/aos-subagent-statusline \
            plugins/grok/bin/aos-up plugins/grok/bin/aos-doctor \
            plugins/grok/bin/aos-install plugins/grok/bin/aos-update-check \
            plugins/grok/bin/lib-aos-resolve.sh \
            plugins/unicity-aos/bin/aos-up plugins/unicity-aos/bin/aos-doctor \
            plugins/unicity-aos/bin/aos-install plugins/unicity-aos/bin/aos-update-check \
            plugins/unicity-aos/bin/lib-aos-resolve.sh plugins/unicity-aos/install.sh

      - name: Verify aos-up executes its resolve block
        run: |
          set -euo pipefail
          # Regression guard: an unterminated ${...} default (missing brace)
          # once swallowed the whole resolve block — including sourcing
          # lib-aos-resolve.sh — into one assignment word, so aos-up
          # crashed on unbound vars under set -u and the MCP server died on
          # launch (-32000). `sh -n` still parses that file, so assert
          # BEHAVIOUR instead: with no aos resolvable anywhere, the
          # resolve-failure branch must run — exit 127 with its guidance.
          tmp_home="$(mktemp -d)"
          trap 'rm -rf "$tmp_home"' EXIT
          for host in claude grok; do
            case "$host" in
              claude) root_var=CLAUDE_PLUGIN_ROOT ;;
              grok)   root_var=GROK_PLUGIN_ROOT ;;
            esac
            rc=0
            out="$(env -i PATH=/usr/bin:/bin HOME="$tmp_home" AOS_HOME="$tmp_home" \
              "$root_var=$PWD/plugins/$host" \
              "plugins/$host/bin/aos-up" </dev/null 2>&1)" || rc=$?
            if [ "$rc" -ne 127 ]; then
              echo "::error::plugins/$host/bin/aos-up exited $rc (want 127 from the resolve-failure branch). Output:"
              printf '%s\n' "$out"
              exit 1
            fi
            printf '%s\n' "$out" | grep -q "could not find the Unicity AOS command" || {
              echo "::error::plugins/$host/bin/aos-up did not print the resolve-failure guidance. Output:"
              printf '%s\n' "$out"
              exit 1
            }
            echo "ok $host: resolve block runs (127 + guidance)"
          done

          # A legacy home must never become a product-command fallback.
          mkdir -p "$tmp_home/.astrid/bin"
          ln -s /bin/echo "$tmp_home/.astrid/bin/aos"
          ln -s /bin/echo "$tmp_home/.astrid/bin/astrid"
          rc=0
          out="$(env -i PATH=/usr/bin:/bin HOME="$tmp_home" \
            CLAUDE_PLUGIN_ROOT="$PWD/plugins/claude" \
            plugins/claude/bin/aos-up </dev/null 2>&1)" || rc=$?
          test "$rc" -eq 127
          printf '%s\n' "$out" | grep -q "could not find the Unicity AOS command"

          # A resolved product command receives the principal before the MCP
          # command, and no wrapper-owned daemon flags are injected.
          forwarded="$(AOS_BIN=/bin/echo CLAUDE_PLUGIN_ROOT="$PWD/plugins/claude" \
            plugins/claude/bin/aos-up --principal claude-code)"
          test "$forwarded" = "--principal claude-code mcp serve"

          # An explicitly selected AOS_HOME is authoritative: a PATH command
          # must not silently replace a broken configured installation.
          mkdir -p "$tmp_home/path-bin" "$tmp_home/explicit-home"
          ln -s /bin/echo "$tmp_home/path-bin/aos"
          rc=0
          out="$(env -i PATH="$tmp_home/path-bin:/usr/bin:/bin" HOME="$tmp_home" \
            AOS_HOME="$tmp_home/explicit-home" \
            CLAUDE_PLUGIN_ROOT="$PWD/plugins/claude" \
            plugins/claude/bin/aos-up </dev/null 2>&1)" || rc=$?
          test "$rc" -eq 127
          printf '%s\n' "$out" | grep -q "AOS_HOME is set but does not contain bin/aos"

      - name: Verify Unicity AOS Codex plugin
        run: |
          set -euo pipefail
          jq -e '.mcpServers.aos.command == "./bin/aos-up" and .mcpServers.aos.cwd == "."' plugins/unicity-aos/.mcp.json
          jq -e '
            .name == "unicity-aos-oracles" and
            .plugins[0].name == "unicity-aos" and
            .plugins[0].source.source == "local" and
            .plugins[0].source.path == "./plugins/unicity-aos" and
            .plugins[0].policy.installation == "AVAILABLE" and
            .plugins[0].policy.authentication == "ON_INSTALL" and
            .plugins[0].category == "Developer Tools"
          ' .agents/plugins/marketplace.json
          test -f plugins/unicity-aos/bin/lib-aos-resolve.sh
          test ! -L plugins/unicity-aos/bin/lib-aos-resolve.sh
          test -f plugins/unicity-aos/bin/aos-doctor
          test ! -L plugins/unicity-aos/bin/aos-doctor
          test -f plugins/unicity-aos/bin/aos-install
          test ! -L plugins/unicity-aos/bin/aos-install
          test -f plugins/unicity-aos/bin/aos-update-check
          test ! -L plugins/unicity-aos/bin/aos-update-check
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path("plugins/unicity-aos")
          manifest = json.loads((root / ".codex-plugin/plugin.json").read_text())
          assert manifest["name"] == root.name
          assert manifest["mcpServers"] == "./.mcp.json"
          assert "hooks" not in manifest
          assert (root / "skills/unicity-aos/SKILL.md").is_file()
          assert (root / "hooks/hooks.json").is_file()
          PY

      - name: Verify Unicity AOS resolver environment overrides
        run: |
          set -euo pipefail
          bin_root="$(mktemp -d)"
          trap 'rm -rf "$bin_root"' EXIT
          touch "$bin_root/aos"
          chmod +x "$bin_root/aos"

          resolved="$(AOS_PLUGIN_ROOT="$PWD/plugins/unicity-aos" AOS_BIN_ROOT="$bin_root" sh -c '. "$AOS_PLUGIN_ROOT/bin/lib-aos-resolve.sh"; aos_resolve_cli')"
          test "$resolved" = "bin-root|$bin_root/aos"

          resolved="$(AOS_PLUGIN_ROOT="$PWD/plugins/unicity-aos" AOS_BIN="$bin_root/aos" sh -c '. "$AOS_PLUGIN_ROOT/bin/lib-aos-resolve.sh"; aos_resolve_cli')"
          test "$resolved" = "direct|$bin_root/aos"

          forwarded="$(AOS_BIN=/bin/echo plugins/unicity-aos/bin/aos-up --principal codex-code)"
          test "$forwarded" = "--principal codex-code mcp serve"

      - name: Verify Claude/Grok plugins are self-contained (synced from common)
        run: |
          set -euo pipefail
          # Marketplace install packages ONLY a single plugin's source subtree,
          # so a mirror host's bin/ must ship real, regular-file copies of the
          # shared scripts. A thin wrapper that exec's ../../common/bin/aos-up,
          # or a symlink into ../../common, dangles in the installed cache and the
          # MCP stdio server dies on launch ("-32000 failed to reconnect").
          for h in claude grok; do
            for f in aos-up aos-doctor aos-install aos-update-check lib-aos-resolve.sh; do
              p="plugins/$h/bin/$f"
              test -f "$p"   || { echo "::error::$p is missing"; exit 1; }
              test ! -L "$p" || { echo "::error::$p is a symlink; must be a regular file"; exit 1; }
            done
            for old in astrid-up astrid-doctor astrid-install lib-astrid-resolve.sh; do
              test ! -e "plugins/$h/bin/$old" || {
                echo "::error::plugins/$h/bin/$old is a retired public entrypoint"
                exit 1
              }
            done
          done
          # And they must not have drifted from the plugins/common/bin source.
          scripts/sync-plugins.sh
          if ! git diff --quiet -- \
            plugins/claude/bin plugins/grok/bin \
            plugins/unicity-aos/bin/aos-install \
            plugins/unicity-aos/bin/aos-update-check
          then
            echo "::error::vendored plugin scripts drifted from plugins/common/bin."
            echo "Edit plugins/common/bin, then run scripts/sync-plugins.sh and commit."
            git --no-pager diff --stat -- \
              plugins/claude/bin plugins/grok/bin \
              plugins/unicity-aos/bin/aos-install \
              plugins/unicity-aos/bin/aos-update-check
            exit 1
          fi

  product-contracts:
    name: AOS product contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Validate additive packs and product boundary
        run: |
          python3 scripts/test_pack_contract.py
          python3 scripts/test_brand_boundary.py
          python3 scripts/test_wit_contract.py
      - name: Exercise the non-interactive pack installer twice
        run: |
          scripts/test-install.sh
          scripts/test-plugin-bootstrap.sh
      - name: Validate the root installer shell
        run: |
          sh -n install.sh
          shellcheck --severity=warning --exclude=SC1007 install.sh
