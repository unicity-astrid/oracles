# Distro.toml — the "Sage" distribution: Claude Code, governed by Astrid.
#
# Install with `astrid init --distro sage` (a bare name resolves to
# raw.githubusercontent.com/unicity-astrid/sage/main/Distro.toml — this file at
# the repo root). Provisioning is PER PRINCIPAL and human-consented: the plugin
# does NOT auto-provision. The SessionStart doctor detects that the session's
# principal has no sage-mcp broker and OFFERS `astrid init --distro sage
# --principal <p>`; the user agrees; init installs this capsule set under that
# principal. bin/astrid-up never runs init (no TTY, and its stdout is the
# JSON-RPC transport). Per-principal provisioning (`astrid init --principal`)
# landed in astrid 0.9.0; 0.9.1 fixed the broken astrid:process@1.0.0
# host ABI — hence the astrid-version floor below.
#
# DESIGN NOTES
#  * Unattended by construction: NO `group`s and NO `{{ var }}` templates, so
#    neither `astrid init` stdin prompt (capsule multi-select / variable
#    collection) fires. init installs it with zero operator input.
#  * Env propagation: the [capsule.env] tables set NON-secret config verbatim.
#    At `astrid init` these are written to
#    ~/.astrid/home/<principal>/.config/env/<capsule>.env.json (0600); the
#    kernel seeds them into each capsule's scoped KV at load, so the capsule's
#    own `env::var(...)` reads them. A distro CANNOT provision `type = "secret"`
#    keys (those read from the SecretStore, which init never writes), so
#    `api_key` is deliberately absent: subscription mode leaves it blank, API
#    mode provisions it out-of-band via `astrid secret set`.
#  * Install path: prebuilt `.capsule` release assets are the blessed,
#    no-toolchain path — every capsule repo below publishes componentized
#    `.capsule` assets, and the installer disambiguates a monorepo's multiple
#    assets by capsule-name hint (release-asset and clone+build paths alike).

schema-version = 1

[distro]
id = "sage"
name = "Sage"
pretty-name = "Sage (Claude on Astrid)"
version = "0.2.3"            # bump to force re-provision (is_lock_fresh keys on id + version)
description = "Claude Code, governed by Astrid — capsule tool broker, native-tool policy gate, and per-principal provisioning."
maintainers = ["Joshua J. Bouw <dev@joshuajbouw.com>"]
repository = "https://github.com/unicity-astrid/agents"
license = "MIT OR Apache-2.0"
astrid-version = ">=0.9.1"  # 0.9.0 shipped a broken astrid:process@1.0.0 host ABI (sage supervisor + shell fail to instantiate); fixed in 0.9.1

# --- The uplink. Validation requires at least one capsule with role = "uplink";
#     capsule-cli owns the Unix socket + handshake, so it is the frontend. ---
[[capsule]]
name = "astrid-capsule-cli"
source = "@unicity-astrid/capsule-cli"
version = "0.2.0"
role = "uplink"

# --- The governed-Claude-Code stack (all live in @unicity-astrid/agents). ---

# Supervisor: owns kv://sage.principal.config; handles spawn / send / settings.
# The distro flips the capsule's own defaults (headless / api_key) to the
# plugin path (repl / subscription) via env propagation — this is the lever a
# distro uses to configure its capsules.
[[capsule]]
name = "sage"
source = "@unicity-astrid/agents"
version = "0.2.2"
[capsule.env]
interaction_mode = "repl"          # you run `claude` directly (the plugin), not Astrid-driven headless
auth_mode = "subscription"         # Claude Code uses your subscription; no API key

# Broker + native-tool PreToolUse policy gate + tool discovery.
[[capsule]]
name = "sage-mcp"
source = "@unicity-astrid/agents"
version = "0.2.2"
# policy_rules defaults to "" (no extra per-principal rules); the managed
# settings gate is the primary policy plane. Set a JSON array of capsule-side
# argument-level rules here if desired (see sage-mcp policy docs).

# Per-principal provisioner: writes .claude/settings(.local|.managed).json,
# .mcp.json, CLAUDE.md, and the hook block for the governed agent.
[[capsule]]
name = "sage-install"
source = "@unicity-astrid/agents"
version = "0.2.2"

# Capsule-authoring forge: the self-contained authoring Skill + tools so a
# fresh Claude knows how to build a capsule (SDK, WIT, Capsule.toml).
[[capsule]]
name = "astrid-capsule-forge"
source = "@unicity-astrid/capsule-forge"
version = "0.1.0"

# --- Tool-provider capsules: the `mcp__sage__*` broker tool surface ------------
# Plain [[capsule]] entries, NO `group` — a group triggers the interactive
# multi-select and breaks the distro's zero-input install contract. These are
# the governed tool set the doctor's provisioning offer promises.
[[capsule]]
name = "astrid-capsule-fs"
source = "@unicity-astrid/capsule-fs"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-http"
source = "@unicity-astrid/capsule-http"
version = "0.1.1"

[[capsule]]
name = "astrid-capsule-system"
source = "@unicity-astrid/capsule-system"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-skills"
source = "@unicity-astrid/capsule-skills"
version = "0.2.0"

# Governed shell execution — exec through the capability/consent/audit plane.
[[capsule]]
name = "astrid-capsule-shell"
source = "@unicity-astrid/capsule-shell"
version = "0.2.0"

# NOTE: the sibling `sage-completion` capsule (Anthropic-API LLM provider —
# "Claude as a model" for Astrid's own per-turn completions) is deliberately
# NOT bundled here. It needs an Anthropic API key and serves the API path, not
# this distro's subscription posture. It belongs in a provider-selection distro
# (e.g. astralis, under a `group = "llm"` choice) once the distro secret path
# can provision a provider key.

# --- Tool surface ---
# This distro governs Claude's NATIVE tools (Read/Write/Bash) through the
# sage-mcp PreToolUse gate AND ships the `mcp__sage__*` broker tool surface by
# default: the fs / http / system / skills capsules above are provisioned
# alongside the broker so a freshly-provisioned principal has a working tool set
# with no extra steps. `astrid-capsule-shell` is deliberately EXCLUDED — its
# current build is rejected by the loader ("Unsupported entry point"); re-add it
# here once that is fixed. The sibling `sage-completion` capsule stays out for
# the reasons noted above (API-key provider, wrong posture for this distro).
