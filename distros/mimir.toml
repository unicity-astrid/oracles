# Distro.toml — the "Mimir" distribution: Grok Build, governed by Astrid.
#
# Install with `astrid init --distro mimir` (a bare name resolves to
# raw.githubusercontent.com/unicity-astrid/mimir/main/Distro.toml) or a local
# path: `astrid init --distro ./Distro.toml --principal grok-code`.
# Provisioning is PER PRINCIPAL and human-consented: the plugin does NOT
# auto-provision. The SessionStart doctor detects that the session's principal
# has no mimir-mcp broker and OFFERS init; the user agrees.
#
# DESIGN NOTES
#  * Unattended by construction: NO `group`s and NO `{{ var }}` templates.
#  * v1 is REPL-only: Grok runs natively in the editor; there is no supervised
#    headless `grok -p` capsule yet (Sage/Sibyl have those). The broker + tool
#    surface is the whole product for interactive Grok.

schema-version = 1

[distro]
id = "mimir"
name = "Mimir"
pretty-name = "Mimir (Grok on Astrid)"
version = "0.1.0"
description = "Grok Build, governed by Astrid — capsule tool broker and per-principal provisioning."
maintainers = ["Joshua J. Bouw <dev@joshuajbouw.com>"]
repository = "https://github.com/unicity-astrid/agents"
license = "MIT OR Apache-2.0"
astrid-version = ">=0.9.1"

[[capsule]]
name = "astrid-capsule-cli"
source = "@unicity-astrid/capsule-cli"
version = "0.2.0"
role = "uplink"

# Broker + policy gate + tool discovery for `astrid mcp serve`.
[[capsule]]
name = "mimir-mcp"
source = "@unicity-astrid/agents"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-forge"
source = "@unicity-astrid/capsule-forge"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-fs"
source = "@unicity-astrid/capsule-fs"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-http"
source = "@unicity-astrid/capsule-http"
version = "0.1.1"

[[capsule]]
name = "astrid-capsule-system"
source = "@unicity-astrid/capsule-system"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-skills"
source = "@unicity-astrid/capsule-skills"
version = "0.2.0"

[[capsule]]
name = "astrid-capsule-shell"
source = "@unicity-astrid/capsule-shell"
version = "0.2.0"
