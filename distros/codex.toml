# Astrid for Codex — shared oracle broker plus Codex supervisor/install.
schema-version = 1

[distro]
id = "codex"
name = "codex"
pretty-name = "Astrid for Codex"
version = "0.1.0"
description = "Codex, governed by Astrid — shared oracle broker, host policy gate, per-principal provisioning."
maintainers = ["Joshua J. Bouw <dev@joshuajbouw.com>"]
repository = "https://github.com/unicity-astrid/oracles"
license = "MIT OR Apache-2.0"
astrid-version = ">=0.9.1"

[[capsule]]
name = "astrid-capsule-cli"
source = "@unicity-astrid/capsule-cli"
version = "0.2.0"
role = "uplink"

[[capsule]]
name = "sibyl"
source = "@unicity-astrid/oracles"
version = "0.1.0"
[capsule.env]
interaction_mode = "repl"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
profile = "codex"
ephemeral = "false"
ignore_user_config = "false"
ignore_rules = "false"
skip_git_repo_check = "false"
mirror_json_events = "true"

[[capsule]]
name = "astrid-mcp"
source = "@unicity-astrid/oracles"
version = "0.1.0"

[[capsule]]
name = "sibyl-install"
source = "@unicity-astrid/oracles"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-forge"
source = "@unicity-astrid/capsule-forge"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-fs"
source = "@unicity-astrid/capsule-fs"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-http"
source = "@unicity-astrid/capsule-http"
version = "0.1.1"

[[capsule]]
name = "astrid-capsule-system"
source = "@unicity-astrid/capsule-system"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-skills"
source = "@unicity-astrid/capsule-skills"
version = "0.2.0"

[[capsule]]
name = "astrid-capsule-shell"
source = "@unicity-astrid/capsule-shell"
version = "0.2.0"
