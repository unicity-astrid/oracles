# Distro.toml — the "Sibyl" distribution: Codex, governed by Astrid.
#
# Install with `astrid init --distro ./Distro.toml --principal <principal>`.
# Like Sage, this distro is intentionally zero-input: no groups and no template
# variables, so a plugin-side provisioning offer can run without interactive
# capsule selection.

schema-version = 1

[distro]
id = "sibyl"
name = "Sibyl"
pretty-name = "Sibyl (Codex on Astrid)"
version = "0.1.0"
description = "Codex, governed by Astrid — capsule tool broker, native-tool policy gate, and per-principal provisioning."
maintainers = ["Joshua J. Bouw <dev@joshuajbouw.com>"]
repository = "https://github.com/unicity-astrid/agents"
license = "MIT OR Apache-2.0"
astrid-version = ">=0.9.1"

[[capsule]]
name = "astrid-capsule-cli"
source = "@unicity-astrid/capsule-cli"
version = "0.2.0"
role = "uplink"

[[capsule]]
name = "sibyl"
source = "@unicity-astrid/agents"
version = "0.1.0"
[capsule.env]
interaction_mode = "repl"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
profile = "sibyl"
ephemeral = "false"
ignore_user_config = "false"
ignore_rules = "false"
skip_git_repo_check = "false"
mirror_json_events = "true"

[[capsule]]
name = "sibyl-mcp"
source = "@unicity-astrid/agents"
version = "0.1.0"

[[capsule]]
name = "sibyl-install"
source = "@unicity-astrid/agents"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-forge"
source = "@unicity-astrid/capsule-forge"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-fs"
source = "@unicity-astrid/capsule-fs"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-http"
source = "@unicity-astrid/capsule-http"
version = "0.1.1"

[[capsule]]
name = "astrid-capsule-system"
source = "@unicity-astrid/capsule-system"
version = "0.1.0"

[[capsule]]
name = "astrid-capsule-skills"
source = "@unicity-astrid/capsule-skills"
version = "0.2.0"

[[capsule]]
name = "astrid-capsule-shell"
source = "@unicity-astrid/capsule-shell"
version = "0.2.0"
