[package]
name = "sibyl-install"
version = "0.1.0"
description = "Per-principal Codex provisioner"
authors = [
    "Joshua J. Bouw <dev@joshuajbouw.com>",
    "Unicity Labs <info@unicity-labs.com>",
]
astrid-version = ">=0.9.1"

[[component]]
id = "sibyl-install"
file = "sibyl_install.wasm"
type = "executable"

[capabilities]
fs_read = ["home://"]
fs_write = ["home://.codex/"]
kv = []

[subscribe]
"sibyl.v1.install.run" = { wit = "opaque", handler = "handle_install" }
"sibyl.v1.install.relink" = { wit = "opaque", handler = "handle_relink" }

[publish]
"sibyl.v1.install.status" = "opaque"
"sibyl.v1.install.complete" = "opaque"
"sibyl.v1.audit.*" = "opaque"
