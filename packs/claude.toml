schema-version = 1

[pack]
id = "claude-oracle"
name = "Unicity AOS for Claude Code"
version = "0.2.5"
host = "claude"
principal = "claude-code"
description = "Claude Code integration for Unicity AOS."
repository = "https://github.com/unicity-aos/oracles"
license = "MIT OR Apache-2.0"
aos-version = ">=2026.1.0"

[[aos-capsule]]
name = "aos-skills"
availability = "required"

[[aos-capsule]]
name = "aos-forge"
availability = "if-present"

[[capsule]]
name = "aos-mcp"
asset = "aos-mcp.capsule"
